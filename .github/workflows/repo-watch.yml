name: Repository Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  actions: read
  issues: read
  pull-requests: read

jobs:
  repo-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run repository monitor
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          python tools/repo_watch.py
          --repo RenierM26/pyEzvizApi
          --config config/repo-watch.json
          --output .repo-watch

      - name: Add digest to job summary
        run: |
          cat .repo-watch/openclaw-digest.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat .repo-watch/dashboard.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload monitor artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-watch
          path: .repo-watch
          retention-days: 14
