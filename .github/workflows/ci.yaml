name: CI

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]
    paths:
      - "pyezvizapi/**"
      - "examples/**"
      - "pyproject.toml"
      - ".ruff.toml"
      - "pytest.ini"
      - ".github/workflows/**"
      - "!**/*.md"
      - "!docs/**"
  push:
    branches: [ main ]
    tags: [ "v*" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    name: lint-test (py${{ matrix.python-version }})

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-py${{ matrix.python-version }}-pip-

      - name: Upgrade pip
        run: python -m pip install -U pip wheel

      - name: Install project + dev deps
        run: pip install -e .[dev]

      - name: Check installed dependency consistency
        run: python -m pip check

      - name: Ruff
        run: ruff check .

      - name: Codespell
        if: matrix.python-version == '3.12'
        run: codespell pyezvizapi tests README.md pyproject.toml .github

      - name: Audit Python dependencies
        if: matrix.python-version == '3.12'
        run: pip-audit --progress-spinner off

      - name: mypy (auto-install any missing stubs)
        run: mypy --install-types --non-interactive .

      - name: pytest with coverage (skip gracefully if no tests yet)
        shell: bash
        run: |
          if compgen -G "tests/test_*.py" > /dev/null; then
            pytest --cov=pyezvizapi --cov-report=term-missing --cov-report=xml --cov-fail-under=85
          else
            echo "No tests found under tests/, skipping pytest."
          fi

      - name: Upload coverage XML
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Smoke-test built wheel and CLI
        shell: bash
        run: |
          python -m venv /tmp/pyezvizapi-wheel-smoke
          /tmp/pyezvizapi-wheel-smoke/bin/python -m pip install -U pip
          /tmp/pyezvizapi-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/pyezvizapi-wheel-smoke/bin/python -m pip check
          /tmp/pyezvizapi-wheel-smoke/bin/python -m pyezvizapi --help
          /tmp/pyezvizapi-wheel-smoke/bin/pyezvizapi --help
