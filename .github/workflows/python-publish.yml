name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, matching pyproject.toml, e.g. 1.0.4.5"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify release version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]

          if os.environ["GITHUB_EVENT_NAME"] == "workflow_dispatch":
              requested = os.environ["REQUESTED_VERSION"].strip()
              if requested.startswith("v"):
                  raise SystemExit("Use the bare version input, e.g. 1.0.4.5, not v1.0.4.5.")
              if requested != version:
                  raise SystemExit(
                      f"Requested release version {requested!r} does not match "
                      f"pyproject version {version!r}."
                  )
          else:
              ref_name = os.environ["GITHUB_REF_NAME"]
              expected = f"v{version}"
              if ref_name != expected:
                  raise SystemExit(
                      f"Release tag {ref_name!r} does not match pyproject version {version!r}; "
                      f"expected {expected!r}."
                  )

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a") as file:
              print(f"version={version}", file=file)
              print(f"tag=v{version}", file=file)
          print(f"Release version {version!r} verified.")
          PY

      - name: Verify manual release tag does not already exist
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists. Refusing to reuse a release tag."
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists. Refusing to overwrite it."
            exit 1
          fi
          echo "Release tag ${RELEASE_TAG} is available."

      - name: Build release distributions
        run: |
          python -m pip install -U pip build twine
          python -m build
          twine check dist/*

      - name: Smoke-test built wheel and CLI
        shell: bash
        run: |
          python -m venv /tmp/pyezvizapi-release-smoke
          /tmp/pyezvizapi-release-smoke/bin/python -m pip install -U pip
          /tmp/pyezvizapi-release-smoke/bin/python -m pip install dist/*.whl
          /tmp/pyezvizapi-release-smoke/bin/python -m pip check
          /tmp/pyezvizapi-release-smoke/bin/python -m pyezvizapi --help
          /tmp/pyezvizapi-release-smoke/bin/pyezvizapi --help

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/pyezvizapi/${{ needs.release-build.outputs.version }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - release-build
      - pypi-publish
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-build.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release-build.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(
            "${RELEASE_TAG}"
            dist/*
            --repo "${GITHUB_REPOSITORY}"
            --title "${RELEASE_TAG}"
            --target "${GITHUB_SHA}"
            --generate-notes
            --notes "This release was created by the Upload Python Package workflow after package checks passed and PyPI publishing completed."
          )
          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
